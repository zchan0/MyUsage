name: Deploy site

# Build the Astro site under site/ and deploy to GitHub Pages.
# One-time setup: in the repo's Settings → Pages, set the Build and
# deployment "Source" to "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs in between.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          # Astro needs the public site URL at build time for the sitemap.
          PUBLIC_SITE_URL: https://zchan0.github.io/MyUsage

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify IndexNow (Bing / Yandex)
        # IndexNow lets us push "new content" notifications to Bing &
        # friends without account-bound API auth — the only auth is the
        # key file at site root, which we ship in public/. Submitting
        # the sitemap URL is the simplest "everything's been updated"
        # ping; the indexer dereferences and crawls from there.
        run: |
          curl -fsS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "zchan0.github.io",
              "key": "64cc2cd2e20c7733b2624eec5da21318",
              "keyLocation": "https://zchan0.github.io/MyUsage/64cc2cd2e20c7733b2624eec5da21318.txt",
              "urlList": [
                "https://zchan0.github.io/MyUsage/",
                "https://zchan0.github.io/MyUsage/install",
                "https://zchan0.github.io/MyUsage/docs/multi-device-sync",
                "https://zchan0.github.io/MyUsage/sitemap-index.xml"
              ]
            }' || echo "IndexNow ping failed (non-fatal)"
